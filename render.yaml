services:
  - type: web
    name: worldnewz-webapi
    env: dotnet
    plan: free
    region: singapore
    buildCommand: "dotnet publish WorldNewzWebAPI/WorldNewzWebAPI.csproj -c Release -o WorldNewzWebAPI/out"
    startCommand: "dotnet WorldNewzWebAPI/out/WorldNewzWebAPI.dll"
    envVars:
      - key: NEWS_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ganeshkumargit12.github.io,http://localhost:5173,http://localhost:5174"
      - key: DATABASE_PATH
        value: "worldnews.db"
    healthCheckPath: "/health"
